base:
- base/yolov8.yaml
postprocessing:
  meta_arch: yolo26
  device_pre_post_layers:
    nms: false
    sigmoid: false
  hpp: false
  anchors:
    sizes:
    - - 1
      - 1
    - - 1
      - 1
    - - 1
      - 1
parser:
  nodes:
  - images
  - - /model.23/one2one_cv2.0/one2one_cv2.0.2/Conv
    - /model.23/one2one_cv2.1/one2one_cv2.1.2/Conv
    - /model.23/one2one_cv2.2/one2one_cv2.2.2/Conv
    - /model.23/one2one_cv3.0/one2one_cv3.0.2/Conv
    - /model.23/one2one_cv3.1/one2one_cv3.1.2/Conv
    - /model.23/one2one_cv3.2/one2one_cv3.2.2/Conv
info:
  task: object detection
  input_shape: 640x640x3
  output_shape: 80x80x80, 40x40x80, 20x20x80, 80x80x4, 40x40x4, 20x20x4
  framework: pytorch
  training_data: coco train2017
  validation_data: coco val2017
  eval_metric: mAP
  source: https://github.com/ultralytics/ultralytics
  license_url: https://github.com/ultralytics/ultralytics/blob/main/LICENSE
  license_name: AGPL-3.0
